<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puppet Shooter!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Bangers&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Bangers', cursive;
    overflow: hidden;
    user-select: none;
  }
  #title {
    color: #e8c5ff;
    font-size: 2rem;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #9b4dca, 0 0 40px #9b4dca;
    margin-bottom: 8px;
  }
  #hud {
    display: flex;
    gap: 30px;
    margin-bottom: 8px;
    font-size: 1.3rem;
    color: #fff;
  }
  #score-display { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
  #lives-display { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
  #level-display { color: #44ffaa; text-shadow: 0 0 10px #44ffaa; }
  canvas {
    border: 2px solid #9b4dca;
    box-shadow: 0 0 30px #9b4dca55;
    border-radius: 4px;
    cursor: crosshair;
    background: #0d0d1a;
    max-width: 100%;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 10;
  }
  #overlay h2 {
    font-family: 'Creepster', cursive;
    font-size: 3rem;
    color: #e8c5ff;
    text-shadow: 0 0 30px #9b4dca;
    margin-bottom: 16px;
  }
  #overlay p {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: #aaa;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .play-btn {
    margin-top: 20px;
    padding: 14px 40px;
    font-family: 'Bangers', cursive;
    font-size: 1.8rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #7b2fbe, #9b4dca);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 20px #9b4dca88;
    transition: transform 0.1s;
  }
  .play-btn:hover { transform: scale(1.07); }
</style>
</head>
<body>

<div id="title">🎁 THE PUPPET SHOOTER 🎁</div>
<div id="hud">
  <span id="score-display">SCORE: 0</span>
  <span id="lives-display">❤️❤️❤️</span>
  <span id="level-display">LEVEL: 1</span>
</div>
<canvas id="game" width="480" height="480"></canvas>

<div id="overlay" id="overlay">
  <h2>THE PUPPET</h2>
  <p>...is stringing you along!</p>
  <p style="color:#ffd700;font-size:1rem;margin-top:8px;">Shoot the Puppet blocks before they reach you!</p>
  <button class="play-btn" id="startBtn">▶ PLAY!</button>
  <p style="margin-top:12px;font-size:0.85rem;color:#666;">Move mouse to aim · Click to shoot</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playPiooh() {
  try {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(160, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.25);
  } catch(e) { console.log('audio err', e); }
}

// --- State ---
let score = 0, lives = 3, level = 1, running = false;
let blocks = [], bullets = [], particles = [], starField = [];
let frameCount = 0;

for (let i = 0; i < 70; i++) {
  starField.push({ x: Math.random()*480, y: Math.random()*480, r: Math.random()*1.5, twinkle: Math.random()*Math.PI*2 });
}

const player = { x: 240, y: 448, w: 50, h: 28 };

document.getElementById('startBtn').addEventListener('click', () => {
  ensureAudio();
  startGame();
});

function startGame() {
  score = 0; lives = 3; level = 1;
  blocks = []; bullets = []; particles = [];
  frameCount = 0;
  document.getElementById('overlay').style.display = 'none';
  running = true;
  requestAnimationFrame(loop);
}

function spawnBlock() {
  const x = 80 + Math.random() * (480 - 160);
  const speed = 0.8 + level * 0.35 + Math.random() * 0.5;
  blocks.push({ x, y: -40, w: 52, h: 52, speed, hit: false, alpha: 1 });
}

function shoot(mx, my) {
  if (!running) return;
  const angle = Math.atan2(my - (player.y - 60), mx - (player.x + 16));
  const spd = 12;
  const handX = player.x + 16, handY = player.y - 60;
  bullets.push({ x: handX, y: handY, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd });
  playPiooh();
}

canvas.addEventListener('click', (e) => {
  const r = canvas.getBoundingClientRect();
  const scaleX = 480 / r.width;
  const scaleY = 480 / r.height;
  shoot((e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY);
});

canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  const scaleX = 480 / r.width;
  player.x = Math.max(30, Math.min(450, (e.clientX - r.left) * scaleX));
});

function spawnParticles(x, y) {
  const colors = ['#fff','#e8c5ff','#9b4dca','#ff4daa','#ffd700','#44ffaa'];
  for (let i = 0; i < 20; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color: colors[Math.floor(Math.random()*colors.length)], r: 2+Math.random()*4 });
  }
}

function drawPuppetBlock(x, y, w, h, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  const grad = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
  grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(1,'#2d1b4e');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#9b4dca'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,6); ctx.fill(); ctx.stroke();
  // face
  ctx.fillStyle = '#f0f0f0'; ctx.beginPath(); ctx.ellipse(0,-2,13,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7a3fa0';
  ctx.beginPath(); ctx.ellipse(-8,4,4,2.5,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,4,4,2.5,0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.moveTo(-10,-8); ctx.lineTo(-4,-8); ctx.lineTo(-4,-3); ctx.lineTo(-10,-5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-8); ctx.lineTo(4,-8); ctx.lineTo(4,-3); ctx.lineTo(10,-5); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,4,8,0.2,Math.PI-0.2); ctx.stroke();
  ctx.fillStyle='#cc2222';
  ctx.beginPath(); ctx.arc(-9,2,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,2,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#aaa'; ctx.lineWidth=0.8;
  for (let s of [-8,0,8]) { ctx.beginPath(); ctx.moveTo(s,-h/2); ctx.lineTo(s,-h/2-8); ctx.stroke(); }
  ctx.restore();
}

function drawPlayer() {
  const px = player.x, py = player.y;
  ctx.save();
  ctx.translate(px, py);

  // Body - black with purple stripe
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(-16, -28, 32, 36, 6); ctx.fill();
  // Purple chest stripe
  ctx.fillStyle = '#5a1a8a';
  ctx.beginPath(); ctx.roundRect(-6, -24, 12, 28, 3); ctx.fill();
  // Red chest dots
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.arc(0, -18, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -8, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, 2, 3, 0, Math.PI*2); ctx.fill();

  // Head - white oval face
  ctx.fillStyle = '#d8d8d8';
  ctx.beginPath(); ctx.ellipse(0, -44, 18, 22, 0, 0, Math.PI*2); ctx.fill();

  // Purple cheek marks
  ctx.fillStyle = '#7a3fa0';
  ctx.beginPath(); ctx.ellipse(-11, -40, 5, 3, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11, -40, 5, 3, 0.3, 0, Math.PI*2); ctx.fill();

  // Red nose
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.arc(0, -44, 3.5, 0, Math.PI*2); ctx.fill();

  // Angular black eyes
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.moveTo(-12,-52); ctx.lineTo(-5,-52); ctx.lineTo(-5,-46); ctx.lineTo(-12,-48); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,-52); ctx.lineTo(5,-52); ctx.lineTo(5,-46); ctx.lineTo(12,-48); ctx.closePath(); ctx.fill();

  // Wide grin
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -40, 9, 0.2, Math.PI-0.2); ctx.stroke();

  // Red cheek dots
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.arc(-12, -42, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12, -42, 2, 0, Math.PI*2); ctx.fill();

  // Strings from head
  ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 0.8;
  for (let s of [-8, 0, 8]) {
    ctx.beginPath(); ctx.moveTo(s, -64); ctx.lineTo(s, -66); ctx.stroke();
  }

  // Left arm hanging down
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(-26, -22, 10, 22, 5); ctx.fill();

  // Right arm raised to shoot
  ctx.save();
  ctx.translate(20, -18);
  ctx.rotate(-1.1);
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(-5, -20, 10, 22, 5); ctx.fill();
  // hand
  ctx.beginPath(); ctx.ellipse(0, -22, 6, 6, 0, 0, Math.PI*2); ctx.fill();
  // glowing fingertip
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.ellipse(0, -27, 2.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Legs
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.roundRect(-14, 7, 11, 14, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3, 7, 11, 14, 4); ctx.fill();
  // Striped socks
  ctx.fillStyle = '#9b4dca';
  ctx.beginPath(); ctx.roundRect(-14, 14, 11, 4, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3, 14, 11, 4, 2); ctx.fill();
  // Feet
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.ellipse(-9, 21, 8, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9, 21, 8, 4, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function loop() {
  if (!running) return;
  frameCount++;
  const spawnRate = Math.max(55 - level*6, 20);
  if (frameCount % spawnRate === 0) spawnBlock();
  if (score > 0 && score % 150 === 0 && frameCount % 2 === 0) level = Math.min(Math.floor(score/150)+1, 10);

  ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0,0,480,480);

  // stars
  for (let s of starField) {
    s.twinkle += 0.03;
    ctx.globalAlpha = 0.3 + 0.4*Math.abs(Math.sin(s.twinkle));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // blocks
  for (let i = blocks.length-1; i >= 0; i--) {
    const b = blocks[i];
    b.y += b.speed;
    if (b.hit) { b.alpha -= 0.07; if (b.alpha <= 0) { blocks.splice(i,1); continue; } }
    else if (b.y > 510) { lives--; blocks.splice(i,1); if (lives <= 0) { gameOver(); return; } continue; }
    drawPuppetBlock(b.x, b.y, b.w, b.h, b.alpha);
  }

  // bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const bul = bullets[i];
    bul.x += bul.vx; bul.y += bul.vy;
    if (bul.x<0||bul.x>480||bul.y<0||bul.y>480) { bullets.splice(i,1); continue; }
    let hit = false;
    for (let bl of blocks) {
      if (!bl.hit && Math.abs(bul.x-bl.x)<bl.w/2 && Math.abs(bul.y-bl.y)<bl.h/2) {
        bl.hit = true; spawnParticles(bl.x,bl.y); score += 10; hit = true; break;
      }
    }
    if (hit) { bullets.splice(i,1); continue; }
    ctx.save(); ctx.shadowColor='#ffd700'; ctx.shadowBlur=12;
    ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(bul.x,bul.y,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  drawPlayer();

  document.getElementById('score-display').textContent = 'SCORE: '+score;
  document.getElementById('lives-display').textContent = '❤️'.repeat(lives);
  document.getElementById('level-display').textContent = 'LEVEL: '+level;

  requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h2>GAME OVER!</h2>
    <p style="color:#ffd700;font-size:1.5rem;">SCORE: ${score}</p>
    <p style="color:#aaa;">The Puppet got you... this time.</p>
    <button class="play-btn" onclick="ensureAudio();startGame()">▶ TRY AGAIN!</button>
  `;
}
</script>
</body>
</html>
